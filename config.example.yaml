# Load Ants 配置示例（vNext）

listeners:
  udp: "0.0.0.0:53"
  tcp: "0.0.0.0:53"
  doh: "0.0.0.0:8080"
  tcp_idle_timeout: 15
  http_idle_timeout: 30

admin:
  listen: "0.0.0.0:9000"

cache:
  enabled: true
  size: 20000
  ttl:
    min: 120
    max: 7200
    negative: 600

http:
  connect_timeout: 5
  request_timeout: 10
  idle_timeout: 60
  keepalive: 60
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

dns:
  connect_timeout: 2
  request_timeout: 3
  prefer_tcp: false
  tcp_reconnect: true

upstreams:
  - name: "google"
    protocol: "doh"
    policy: "random"
    endpoints:
      - url: "https://8.8.8.8/resolve"
        method: "get"
        content_type: "json"
    proxy: "http://127.0.0.1:7890"

  - name: "public"
    protocol: "doh"
    policy: "roundrobin"
    endpoints:
      - url: "https://223.5.5.5/dns-query"
        method: "get"
        content_type: "message"
      - url: "https://223.6.6.6/dns-query"
        method: "get"
        content_type: "message"

  - name: "public_dns"
    protocol: "dns"
    policy: "roundrobin"
    endpoints:
      - addr: 223.5.5.5:53
      - addr: 223.6.6.6:53

rules:
  static:
    - match: "exact"
      patterns: ["ads.example.com", "ads2.example.com"]
      action: "block"

    - match: "regex"
      patterns: ["^(mail|audio)\\.google\\.com$"]
      action: "forward"
      upstream: "google"

    - match: "wildcard"
      patterns: ["*"]
      action: "forward"
      upstream: "public"

  remote:
    - type: "http"
      url: "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt"
      format: "v2ray"
      action: "block"
      retry:
        attempts: 3
        delay: 1
      proxy: "http://127.0.0.1:7890"
      max_size: 10485760

    - type: "http"
      url: "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/proxy-list.txt"
      format: "v2ray"
      action: "forward"
      upstream: "google"
      retry:
        attempts: 3
        delay: 1
      proxy: "http://127.0.0.1:7890"
      max_size: 10485760
