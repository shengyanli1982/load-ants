apiVersion: v1
kind: ConfigMap
metadata:
  name: load-ants-config
  namespace: dns
data:
  config.yaml: |
    listeners:
      udp: "0.0.0.0:53"
      tcp: "0.0.0.0:53"
      doh: "0.0.0.0:8080"
    admin:
      listen: "0.0.0.0:9000"
    cache:
      enabled: true
      size: 10000
      ttl:
        min: 60
        max: 3600
        negative: 300
    http:
      connect_timeout: 5
      request_timeout: 10
      idle_timeout: 60
      keepalive: 60
      user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    dns:
      connect_timeout: 2
      request_timeout: 3
      prefer_tcp: false
      tcp_reconnect: true
    upstreams:
      - name: "google_public"
        protocol: "doh"
        policy: "roundrobin"
        endpoints:
          - url: "https://dns.google/dns-query"
          - url: "https://8.8.4.4/dns-query"
        retry:
          attempts: 3
          delay: 1
    rules:
      static:
        - match: "wildcard"
          patterns: ["*"]
          action: "forward"
          upstream: "google_public"
