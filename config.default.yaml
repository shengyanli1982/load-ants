# Load Ants 默认配置（vNext）
# 必选：表示该配置项必须提供
# 可选：表示该配置项可以不提供，使用默认值

listeners:
  udp: "0.0.0.0:53"
  tcp: "0.0.0.0:53"
  doh: "0.0.0.0:8080"
  tcp_idle_timeout: 10
  http_idle_timeout: 30

admin:
  listen: "0.0.0.0:9000"

cache:
  enabled: true
  size: 10000
  ttl:
    min: 60
    max: 3600
    negative: 300

http:
  connect_timeout: 5
  request_timeout: 10
  idle_timeout: 60
  keepalive: 60
  user_agent: "LoadAnts/0.2"

dns:
  connect_timeout: 2
  request_timeout: 3
  prefer_tcp: false
  tcp_reconnect: true

upstreams:
  - name: "public"
    protocol: "doh"
    policy: "roundrobin"
    # max_concurrent: 1024 # 可选：组级并发保护上限（permit=一次端点尝试），超限直接返回 SERVFAIL
    endpoints:
      - url: "https://223.5.5.5/dns-query"
        method: "get"
        content_type: "message"
      - url: "https://223.6.6.6/dns-query"
        method: "get"
        content_type: "message"

rules:
  static:
    - match: "exact"
      patterns: ["ads.example.com", "ads2.example.com"]
      action: "block"

    - match: "wildcard"
      patterns: ["*"]
      action: "forward"
      upstream: "public"

  remote:
    - type: "http"
      url: "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/reject-list.txt"
      format: "v2ray"
      action: "block"
      retry:
        attempts: 3
        delay: 1
      max_size: 10485760

    - type: "http"
      url: "https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/proxy-list.txt"
      format: "v2ray"
      action: "forward"
      upstream: "public"
      retry:
        attempts: 3
        delay: 1
      max_size: 10485760
